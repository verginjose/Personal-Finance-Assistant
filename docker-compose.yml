services:
  postgres:
    image: postgres:15
    container_name: postgres-db
    deploy:
      resources:
        limits:
          memory: 2.5G
    command: postgres -c shared_buffers=1GB -c work_mem=64MB -c maintenance_work_mem=128MB -c max_connections=200
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - finance-network

  redis:
    image: redis:7-alpine
    container_name: redis
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - finance-network

  upsert-service:
    build:
      context: ./upsert-service
      dockerfile: Dockerfile
    container_name: upsert-service
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${FINANCE_DB_SCHEMA}
      SPRING_DATASOURCE_HIKARI_SCHEMA: ${FINANCE_DB_SCHEMA}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=65.0 -XX:+UseZGC -XX:+ZGenerational -XX:SoftRefLRUPolicyMSPerMB=0 -XX:+ExitOnOutOfMemoryError"
      ANALYTICS_SERVICE_URL: http://analytics-service:8084
    ports:
      - "${UPSERT_SERVICE_PORT}:8081"
    networks:
      - finance-network

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${FINANCE_DB_SCHEMA}
      SPRING_DATASOURCE_HIKARI_SCHEMA: ${FINANCE_DB_SCHEMA}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      GROQ_API_KEY: ${GROQ_API_KEY}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=65.0 -XX:+UseZGC -XX:+ZGenerational -XX:SoftRefLRUPolicyMSPerMB=0 -XX:+ExitOnOutOfMemoryError"
    ports:
      - "${ANALYTICS_SERVICE_PORT}:8084"
    networks:
      - finance-network

  ocr-service:
    build:
      context: ./ocr-service
    container_name: ocr-service
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    volumes:
      - paddle-model-cache:/root/.paddleocr
    ports:
      - "${OCR_SERVICE_PORT:-8100}:8100"
    environment:
      FLAGS_fraction_of_gpu_memory_to_use: "0.65"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      GROQ_API_KEY: ${GROQ_API_KEY}
      UPSERT_SERVICE_URL: http://upsert-service:8081
      OCR_USE_ANGLE_CLS: "false"
      OCR_DET_LIMIT_SIDE_LEN: "736"
    networks:
      - finance-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8100/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      upsert-service:
        condition: service_started
      ocr-service:
        condition: service_healthy
      analytics-service:
        condition: service_started
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

      # Redis — picked up by spring.data.redis.* in application.yml
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Auth Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${AUTH_DB_SCHEMA}
      SPRING_DATASOURCE_HIKARI_SCHEMA: ${AUTH_DB_SCHEMA}

      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=65.0 -XX:+UseZGC -XX:+ZGenerational -XX:SoftRefLRUPolicyMSPerMB=0 -XX:+ExitOnOutOfMemoryError"
    ports:
      - "${API_GATEWAY_PORT}:8080"
    networks:
      - finance-network

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    profiles: [ "observability" ]
    deploy:
      resources:
        limits:
          memory: 2G
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./observability/clickhouse/init:/docker-entrypoint-initdb.d:ro
    networks:
      - finance-network

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    profiles: [ "observability" ]
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - finance-network

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    profiles: [ "observability" ]
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    restart: on-failure
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - clickhouse
      - prometheus
      - vector
    networks:
      - finance-network

  vector:
    image: timberio/vector:0.41.1-debian
    container_name: vector
    profiles: [ "observability" ]
    volumes:
      - ./observability/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: [ "--config", "/etc/vector/vector.yaml" ]
    depends_on:
      - clickhouse
    restart: on-failure
    networks:
      - finance-network


  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3001:80"
    depends_on:
      - api-gateway
    networks:
      - finance-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - finance-network

volumes:
  postgres_data:
  clickhouse_data:
  grafana_data:
  redis-data:
  loki_data:
  paddle-model-cache:

networks:
  finance-network:
    driver: bridge
