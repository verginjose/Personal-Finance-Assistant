services:
  postgres-primary:
    image: ankane/pgvector:v0.5.1
    container_name: postgres-primary
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data_primary:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - finance-network

  postgres-replica:
    image: ankane/pgvector:v0.5.1
    container_name: postgres-replica
    command: |
      bash -c "
      if [ ! -s /var/lib/postgresql/data/PG_VERSION ]; then
        echo 'Starting base backup from postgres-primary...'
        export PGPASSWORD=$${POSTGRES_PASSWORD}
        pg_basebackup -h postgres-primary -p 5432 -U $${POSTGRES_USER} -D /var/lib/postgresql/data -Fp -Xs -P -R
      fi
      exec docker-entrypoint.sh postgres
      "
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_replica:/var/lib/postgresql/data
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - finance-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - finance-network

  minio:
    image: minio/minio
    container_name: minio
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - finance-network

  redis:
    image: redis:7-alpine
    container_name: redis
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - finance-network

  redis-replica:
    image: redis:7-alpine
    container_name: redis-replica
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "6380:6379"
    command: redis-server --replicaof redis 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - finance-network

  command-service:
    build:
      context: ./command-service
      dockerfile: Dockerfile
    container_name: command-service
    depends_on:
      postgres-primary:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-primary:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${FINANCE_DB_SCHEMA}
      SPRING_DATASOURCE_HIKARI_SCHEMA: ${FINANCE_DB_SCHEMA}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=65.0 -XX:+UseZGC -XX:+ZGenerational -XX:SoftRefLRUPolicyMSPerMB=0 -XX:+ExitOnOutOfMemoryError"
      ANALYTICS_SERVICE_URL: http://query-service:8084
    ports:
      - "${UPSERT_SERVICE_PORT}:8081"
    networks:
      - finance-network

  query-service:
    build:
      context: ./query-service
      dockerfile: Dockerfile
    container_name: query-service
    depends_on:
      postgres-primary:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-replica:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${FINANCE_DB_SCHEMA}
      SPRING_DATASOURCE_HIKARI_SCHEMA: ${FINANCE_DB_SCHEMA}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      GROQ_API_KEY: ${GROQ_API_KEY}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=65.0 -XX:+UseZGC -XX:+ZGenerational -XX:SoftRefLRUPolicyMSPerMB=0 -XX:+ExitOnOutOfMemoryError"
    ports:
      - "${ANALYTICS_SERVICE_PORT}:8084"
    networks:
      - finance-network

  ocr-service:
    build:
      context: ./ocr-service
    container_name: ocr-service
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    volumes:
      - paddle-model-cache:/root/.paddleocr
    ports:
      - "${OCR_SERVICE_PORT:-8100}:8100"
    environment:
      FLAGS_fraction_of_gpu_memory_to_use: "0.65"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      GROQ_API_KEY: ${GROQ_API_KEY}
      UPSERT_SERVICE_URL: http://command-service:8081
      OCR_USE_ANGLE_CLS: "false"
      OCR_DET_LIMIT_SIDE_LEN: "736"
    networks:
      - finance-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8100/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      redis:
        condition: service_healthy
      postgres-primary:
        condition: service_healthy
      command-service:
        condition: service_started
      ocr-service:
        condition: service_healthy
      query-service:
        condition: service_started
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

      # Redis — picked up by spring.data.redis.* in application.yml
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Auth Database
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres-primary:5432/${DB_NAME}?schema=${AUTH_DB_SCHEMA}
      SPRING_R2DBC_USERNAME: ${DB_USER}
      SPRING_R2DBC_PASSWORD: ${DB_PASSWORD}

      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=65.0 -XX:+UseZGC -XX:+ZGenerational -XX:SoftRefLRUPolicyMSPerMB=0 -XX:+ExitOnOutOfMemoryError"
    ports:
      - "${API_GATEWAY_PORT}:8080"
    networks:
      - finance-network

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    profiles: [ "observability" ]
    deploy:
      resources:
        limits:
          memory: 2G
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./observability/clickhouse/init:/docker-entrypoint-initdb.d:ro
    networks:
      - finance-network

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    profiles: [ "observability" ]
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - finance-network

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    profiles: [ "observability" ]
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    restart: on-failure
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - clickhouse
      - prometheus
      - vector
    networks:
      - finance-network

  vector:
    image: timberio/vector:0.41.1-debian
    container_name: vector
    profiles: [ "observability" ]
    volumes:
      - ./observability/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: [ "--config", "/etc/vector/vector.yaml" ]
    depends_on:
      - clickhouse
    restart: on-failure
    networks:
      - finance-network


  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3001:80"
    depends_on:
      - api-gateway
    networks:
      - finance-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - finance-network

volumes:
  postgres_data_primary:
  postgres_data_replica:
  clickhouse_data:
  grafana_data:
  redis-data:
  loki_data:
  paddle-model-cache:
  minio_data:

networks:
  finance-network:
    driver: bridge
