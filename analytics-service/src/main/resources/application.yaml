server:
  port: 8084

spring:
  threads:
    virtual:
      enabled: true

  # ── Database ────────────────────────────────────────────────────────────────
  jpa:
    properties:
      hibernate:
        default_schema: finance
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  # ── Redis & Caching ─────────────────────────────────────────────────────────
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          enabled: true
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 200ms

  # ── Kafka ───────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: analytics-cache-evict-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.upsertservice.events,com.finance.analytics.events"
        spring.json.type.mapping: "cacheEvictEvent:com.finance.analytics.events.CacheEvictEvent"

# ── Actuator & Metrics ────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: analytics-service
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true