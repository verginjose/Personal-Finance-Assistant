server.port=8084
spring.threads.virtual.enabled=true
spring.jpa.properties.hibernate.default_schema=finance
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=analytics-service

# ── Redis & Caching Configuration ─────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.cache.type=redis

# add pooling
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=200ms

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=analytics-cache-evict-group
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.upsertservice.events,com.finance.analytics.events
spring.kafka.consumer.properties.spring.json.type.mapping=cacheEvictEvent:com.finance.analytics.events.CacheEvictEvent