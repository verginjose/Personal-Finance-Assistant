server:
  port: 8083

# ── Virtual Threads (Java 21) ─────────────────────────────────────────────────
spring:
  threads:
    virtual:
      enabled: true

  # ── File Upload Limits ──────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ── Groq API Configuration ────────────────────────────────────────────────────
groq:
  api:
    key: ${GROQ_API_KEY}
  model: llama-3.1-8b-instant
  timeout-seconds: 30
  max-retries: 2

# ── Actuator & Metrics ────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: bill-parser-service
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    org.javacode: DEBUG

# ── OCR Service ───────────────────────────────────────────────────────────────
ocr:
  service:
    url: ${OCR_SERVICE_URL:http://ocr-service:8100}