server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Reverse-proxy API calls to the gateway ────────────────────────────────
    location /api/ {
        proxy_pass         http://api-gateway:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE Support (disable buffering and use HTTP/1.1)
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;

        # Bill upload can be large
        client_max_body_size 12M;
    }

    # ── Never cache index.html — always serve the latest entry point ──────────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # ── Disable caching for all static assets during development/frequent deploys ─
    # This prevents the browser AND Cloudflare from caching CSS/JS files
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires 0;
    }

    # ── SPA fallback — all unknown paths serve index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
