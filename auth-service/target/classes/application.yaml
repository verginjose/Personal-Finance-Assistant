server:
  port: 8082

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/finance_assistant
    username: finance_user
    password: finance_pass
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: create          # use Flyway/Liquibase in prod; never auto-create
    show-sql: false
    properties:
      hibernate:
        default_schema: auth
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  # In prod: inject via environment variable / Vault / Kubernetes secret
  # Must be base64-encoded 256-bit key OR a plaintext string >= 32 chars
  secret: KJt4OtYB78HEbSHGwYYQICd5Rz26jhy1LlDwpoervzJ
  expiration-ms: 86400000   # 24h

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.auth: DEBUG
    org.springframework.security: INFO   # set to DEBUG to trace security decisions