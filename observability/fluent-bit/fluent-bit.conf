[SERVICE]
    Flush        2
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Tag               docker.<container_id>
    Tag_Regex         \/var\/lib\/docker\/containers\/(?<container_id>[^\/]+)\/
    DB                /tmp/flb_docker.db
    Parser            docker
    Mem_Buf_Limit     20MB
    Skip_Long_Lines   On
    Refresh_Interval  5

# Map container ID -> friendly service name, set 'source' field
[FILTER]
    Name    lua
    Match   docker.*
    script  /fluent-bit/etc/docker_name.lua
    call    add_container_name

[OUTPUT]
    Name              http
    Match             docker.*
    Host              clickhouse
    Port              8123
    HTTP_User         default
    HTTP_Passwd       clickhouse
    URI               /?query=INSERT%20INTO%20observability_logs.container_logs%20(source%2Clog)%20FORMAT%20JSONEachRow&input_format_skip_unknown_fields=1
    Format            json_lines
    Header            Content-Type  application/x-ndjson
