global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['auth-service:8082']

  - job_name: upsert-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['upsert-service:8081']

  - job_name: analytics-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['analytics-service:8084']

  - job_name: ocr-parser-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['ocr-parser-service:8083']
