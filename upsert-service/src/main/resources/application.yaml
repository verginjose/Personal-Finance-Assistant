server:
  port: 8081

spring:
  threads:
    virtual:
      enabled: true

  jpa:
    properties:
      hibernate:
        default_schema: finance
    open-in-view: false

  mvc:
    async:
      request-timeout: 1800000

  cache:
    type: redis

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: "cacheEvictEvent:com.upsertservice.events.CacheEvictEvent"

# ── Custom DataSources for Read/Write Split ──────────────────────────────────
app:
  datasource:
    write:
      jdbc-url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_assistant}
      username: ${SPRING_DATASOURCE_USERNAME:finance_user}
      password: ${SPRING_DATASOURCE_PASSWORD:finance_pass}
      pool-name: HikariPool-write
      maximum-pool-size: 25
      minimum-idle: 2
      connection-timeout: 3000
      max-lifetime: 1800000
    read:
      jdbc-url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_assistant}
      username: ${SPRING_DATASOURCE_USERNAME:finance_user}
      password: ${SPRING_DATASOURCE_PASSWORD:finance_pass}
      pool-name: HikariPool-read
      maximum-pool-size: 25
      minimum-idle: 5
      connection-timeout: 3000
      max-lifetime: 1800000
      connection-init-sql: SET SESSION CHARACTERISTICS AS TRANSACTION READ ONLY

# ── Actuator & Metrics ────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: upsert-service
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  tracing:
    sampling:
      probability: 1.0
