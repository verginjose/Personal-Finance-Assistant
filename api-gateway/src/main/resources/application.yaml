server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

auth:
  service:
    url: http://auth-service:8082

spring:
  threads:
    virtual:
      enabled: true
  codec:
    max-in-memory-size: 12MB
  webflux:
    multipart:
      max-in-memory-size: 12MB

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8082
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipPathKeyResolver}"

        - id: upsert-service
          uri: http://upsert-service:8081
          predicates:
            - Path=/api/upsert/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: upsert-cb
                fallbackUri: forward:/fallback/upsert

        - id: analytics-service
          uri: http://analytics-service:8084
          predicates:
            - Path=/api/analytics/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: analytics-cb
                fallbackUri: forward:/fallback/analytics

        - id: ocr-parser-service
          uri: http://ocr-parser-service:8083
          predicates:
            - Path=/api/bill/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: ocr-cb
                fallbackUri: forward:/fallback/bill

resilience4j:
  circuitbreaker:
    instances:
      upsert-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 80
      analytics-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 70
      ocr-cb:
        sliding-window-size: 5
        failure-rate-threshold: 40
        wait-duration-in-open-state: 45s
        permitted-number-of-calls-in-half-open-state: 2
        slow-call-duration-threshold: 15s
        slow-call-rate-threshold: 60
  timelimiter:
    instances:
      upsert-cb:
        timeout-duration: 5s
      analytics-cb:
        timeout-duration: 30s
      ocr-cb:
        timeout-duration: 5s

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: api-gateway