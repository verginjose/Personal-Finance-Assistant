server:
  port: 8084

spring:
  threads:
    virtual:
      enabled: true

  # ── Database ────────────────────────────────────────────────────────────────
  jpa:
    properties:
      hibernate:
        default_schema: finance
  datasource:
    hikari:
      maximum-pool-size: 25
      minimum-idle: 2

  # ── Redis & Caching ─────────────────────────────────────────────────────────
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          enabled: true
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 200ms


# ── Groq AI Configuration (for AI Insights feature) ──────────────────────────
groq:
  api:
    key: ${GROQ_API_KEY:}
  model: llama-3.1-8b-instant

# ── Actuator & Metrics ────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: analytics-service
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  tracing:
    sampling:
      probability: 1.0