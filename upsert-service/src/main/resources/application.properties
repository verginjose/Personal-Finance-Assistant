server.port=8081

# ── Virtual Threads (Java 21 / Project Loom) ──────────────────────────────────
# Each incoming HTTP request runs on a lightweight virtual thread.
# No platform thread is blocked during DB I/O — eliminates thread-starvation.
spring.threads.virtual.enabled=true

# ── Disable Spring Boot's single auto-configured DataSource ──────────────────
# We register writeDataSource and readDataSource manually in DataSourceConfig.
spring.datasource.url=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# ── Write DataSource (primary — INSERT / UPDATE / DELETE) ────────────────────
app.datasource.write.jdbc-url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_assistant}
app.datasource.write.username=${SPRING_DATASOURCE_USERNAME:finance_user}
app.datasource.write.password=${SPRING_DATASOURCE_PASSWORD:finance_pass}
app.datasource.write.pool-name=HikariPool-write
# Writes are serialized per row — more connections → more lock contention.
# Formula: (cpu_cores * 2) = 8 for a 4-core host.
app.datasource.write.maximum-pool-size=8
app.datasource.write.minimum-idle=2
app.datasource.write.connection-timeout=3000
app.datasource.write.max-lifetime=1800000

# ── Read DataSource (replica-ready — SELECT queries) ─────────────────────────
app.datasource.read.jdbc-url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_assistant}
app.datasource.read.username=${SPRING_DATASOURCE_USERNAME:finance_user}
app.datasource.read.password=${SPRING_DATASOURCE_PASSWORD:finance_pass}
app.datasource.read.pool-name=HikariPool-read
# Reads are parallelizable — a larger pool handles concurrent SELECT bursts.
app.datasource.read.maximum-pool-size=20
app.datasource.read.minimum-idle=5
app.datasource.read.connection-timeout=3000
app.datasource.read.max-lifetime=1800000
# Read-only connections skip dirty-check and flush overhead
app.datasource.read.connection-init-sql=SET SESSION CHARACTERISTICS AS TRANSACTION READ ONLY

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.properties.hibernate.default_schema=finance
spring.jpa.open-in-view=false

# ── Actuator & Metrics ───────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=upsert-service