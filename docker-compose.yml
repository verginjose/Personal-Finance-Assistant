services:
  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - finance-network

  upsert-service:
    build:
      context: ./upsert-service
      dockerfile: Dockerfile
    container_name: upsert-service
    depends_on:
      - postgres
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${FINANCE_DB_SCHEMA}
      SPRING_DATASOURCE_HIKARI_SCHEMA: ${FINANCE_DB_SCHEMA}
    ports:
      - "${UPSERT_SERVICE_PORT}:8081"
    networks:
      - finance-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    depends_on:
      - postgres
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${AUTH_DB_SCHEMA}
      SPRING_DATASOURCE_HIKARI_SCHEMA: ${AUTH_DB_SCHEMA}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    ports:
      - "${AUTH_SERVICE_PORT}:8082"
    networks:
      - finance-network

  ocr-parser-service:
    build:
      context: ./ocr-parser-service
      dockerfile: Dockerfile
    container_name: ocr-parser-service
    restart: on-failure
    ports:
      - "${OCR_SERVICE_PORT}:8083"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
    networks:
      - finance-network

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    depends_on:
      - postgres
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${FINANCE_DB_SCHEMA}
      SPRING_DATASOURCE_HIKARI_SCHEMA: ${FINANCE_DB_SCHEMA}
    ports:
      - "${ANALYTICS_SERVICE_PORT}:8084"
    networks:
      - finance-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      - upsert-service
      - auth-service
      - ocr-parser-service
      - analytics-service
    restart: on-failure
    environment:
      SPRING_CLOUD_GATEWAY_ROUTES_0_ID: upsert-service
      SPRING_CLOUD_GATEWAY_ROUTES_0_URI: http://upsert-service:8081
      SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0: Path=/api/upsert/**
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_0: StripPrefix=1
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_1: JwtValidation

      SPRING_CLOUD_GATEWAY_ROUTES_1_ID: auth-service
      SPRING_CLOUD_GATEWAY_ROUTES_1_URI: http://auth-service:8082
      SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0: Path=/api/auth/**
      SPRING_CLOUD_GATEWAY_ROUTES_1_FILTERS_0: StripPrefix=1

      SPRING_CLOUD_GATEWAY_ROUTES_2_ID: analytics-service
      SPRING_CLOUD_GATEWAY_ROUTES_2_URI: http://analytics-service:8084
      SPRING_CLOUD_GATEWAY_ROUTES_2_PREDICATES_0: Path=/api/analytics/**
      SPRING_CLOUD_GATEWAY_ROUTES_2_FILTERS_0: StripPrefix=1
      SPRING_CLOUD_GATEWAY_ROUTES_2_FILTERS_1: JwtValidation

      SPRING_CLOUD_GATEWAY_ROUTES_3_ID: ocr-parser-service
      SPRING_CLOUD_GATEWAY_ROUTES_3_URI: http://ocr-parser-service:8083
      SPRING_CLOUD_GATEWAY_ROUTES_3_PREDICATES_0: Path=/api/bill/**
      SPRING_CLOUD_GATEWAY_ROUTES_3_FILTERS_0: StripPrefix=1
      SPRING_CLOUD_GATEWAY_ROUTES_3_FILTERS_1: JwtValidation

      AUTH_SERVICE_URL: http://auth-service:8082
    ports:
      - "${API_GATEWAY_PORT}:8080"
    networks:
      - finance-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "8000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - api-gateway
    networks:
      - finance-network

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./observability/clickhouse/init:/docker-entrypoint-initdb.d:ro
    networks:
      - finance-network

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - finance-network

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      # Allow embedding in the dev panel iframe
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # Anonymous read-only access so the iframe doesn't show a login prompt
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      # Disable login form for anonymous sessions (optional, cleaner UX)
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      # Subpath configuration for reverse proxy
      GF_SERVER_ROOT_URL: "http://localhost:8000/dev-health/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    restart: on-failure
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - clickhouse
      - prometheus
    networks:
      - finance-network

  fluent-bit:
    image: fluent/fluent-bit:3.1
    container_name: fluent-bit
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/fluent-bit.conf"]
    volumes:
      - ./observability/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./observability/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./observability/fluent-bit/docker_name.lua:/fluent-bit/etc/docker_name.lua:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - clickhouse
    restart: on-failure
    networks:
      - finance-network

volumes:
  postgres_data:
  clickhouse_data:
  grafana_data:

networks:
  finance-network:
    driver: bridge