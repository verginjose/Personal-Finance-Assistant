apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki-ds
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: TraceID
          matcherRegex: "traceId=([a-zA-Z0-9]+)"
          url: ""
