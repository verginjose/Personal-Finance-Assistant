services:
  postgres:
    image: postgres:15
    container_name: postgres-db
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - finance-network

  redis:
    image: redis:7-alpine
    container_name: redis
    deploy:
      resources:
        limits:
          memory: 128M
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - finance-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${AUTH_DB_SCHEMA}
      SPRING_DATASOURCE_HIKARI_SCHEMA: ${AUTH_DB_SCHEMA}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"
    ports:
      - "${AUTH_SERVICE_PORT}:8082"
    networks:
      - finance-network

  upsert-service:
    build:
      context: ./upsert-service
      dockerfile: Dockerfile
    container_name: upsert-service
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${FINANCE_DB_SCHEMA}
      SPRING_DATASOURCE_HIKARI_SCHEMA: ${FINANCE_DB_SCHEMA}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "${UPSERT_SERVICE_PORT}:8081"
    networks:
      - finance-network

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${FINANCE_DB_SCHEMA}
      SPRING_DATASOURCE_HIKARI_SCHEMA: ${FINANCE_DB_SCHEMA}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"
    ports:
      - "${ANALYTICS_SERVICE_PORT}:8084"
    networks:
      - finance-network

  bill-parser-service:
    build:
      context: ./bill-parser-service
      dockerfile: Dockerfile
    container_name: bill-parser-service
    depends_on:
      ocr-service:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
    ports:
      - "${OCR_SERVICE_PORT}:8083"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"
      OCR_SERVICE_URL: http://ocr-service:8100   # add this
    networks:
      - finance-network

  ocr-service:
    build:
      context: ./ocr-service
    container_name: ocr-service
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    volumes:
       - paddle-model-cache:/root/.paddleocr    # ← add this
    ports:
      - "8100:8100"
    environment:
      FLAGS_fraction_of_gpu_memory_to_use: "0.65"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    networks:
      - finance-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8100/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      redis:
        condition: service_healthy
      upsert-service:
        condition: service_started
      auth-service:
        condition: service_started
      bill-parser-service:
        condition: service_started
      analytics-service:
        condition: service_started
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

      # Redis — picked up by spring.data.redis.* in application.yml
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Auth service URL
      AUTH_SERVICE_URL: http://auth-service:8082
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"
    ports:
      - "${API_GATEWAY_PORT}:8080"
    networks:
      - finance-network

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    deploy:
      resources:
        limits:
          memory: 2G
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./observability/clickhouse/init:/docker-entrypoint-initdb.d:ro
    networks:
      - finance-network

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - finance-network

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    restart: on-failure
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - clickhouse
      - prometheus
      - vector
    networks:
      - finance-network

  vector:
    image: timberio/vector:0.41.1-debian
    container_name: vector
    volumes:
      - ./observability/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: [ "--config", "/etc/vector/vector.yaml" ]
    depends_on:
      - clickhouse
    restart: on-failure
    networks:
      - finance-network
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - finance-network        # ← was missing

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: false
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - finance-network        # ← was missing        # message storage

volumes:
  postgres_data:
  clickhouse_data:
  grafana_data:
  redis-data:
  loki_data:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  paddle-model-cache:    # ← add to volumes section

networks:
  finance-network:
    driver: bridge
