server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

spring:
  threads:
    virtual:
      enabled: true
  codec:
    max-in-memory-size: 12MB
  webflux:
    multipart:
      max-in-memory-size: 12MB

  sql:
    init:
      mode: always

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          enabled: true
          max-active: 50
          max-idle: 10
          min-idle: 2
          max-wait: 200ms

  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
      routes:
        - id: command-service-sse
          uri: http://command-service:8081
          predicates:
            - Path=/api/upsert/notifications/**
          filters:
            - StripPrefix=2
          metadata:
            response-timeout: 1800000
            connect-timeout: 5000

        - id: command-service-command
          uri: http://command-service:8081
          predicates:
            - Path=/api/upsert/**
            - Method=POST,PUT,PATCH,DELETE
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: upsert-cb
                fallbackUri: forward:/fallback/upsert

        - id: command-service-query
          uri: http://query-service:8084
          predicates:
            - Path=/api/upsert/**
            - Method=GET
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: analytics-cb
                fallbackUri: forward:/fallback/analytics

        - id: query-service
          uri: http://query-service:8084
          predicates:
            - Path=/api/analytics/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: analytics-cb
                fallbackUri: forward:/fallback/analytics



resilience4j:
  circuitbreaker:
    instances:
      upsert-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 80
      analytics-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 70
      ocr-cb:
        sliding-window-size: 5
        failure-rate-threshold: 40
        wait-duration-in-open-state: 45s
        permitted-number-of-calls-in-half-open-state: 2
        slow-call-duration-threshold: 15s
        slow-call-rate-threshold: 60
  timelimiter:
    instances:
      upsert-cb:
        timeout-duration: 5s
      analytics-cb:
        timeout-duration: 30s
      ocr-cb:
        timeout-duration: 45s

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: api-gateway
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  tracing:
    sampling:
      probability: 1.0