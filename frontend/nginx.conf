server {
    listen 80;
    server_name localhost;
    client_max_body_size 12M;

    # Main frontend static files
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API Gateway proxy
    location /api/ {
        proxy_pass http://api-gateway:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── DEV HEALTH PROXIES (same-origin, no CORS issues) ──

    location /dev-health/auth/ {
        proxy_pass http://auth-service:8082/;
        proxy_set_header Host $host;
    }
    location /dev-health/upsert/ {
        proxy_pass http://upsert-service:8081/;
        proxy_set_header Host $host;
    }
    location /dev-health/analytics/ {
        proxy_pass http://analytics-service:8084/;
        proxy_set_header Host $host;
    }
    location /dev-health/ocr/ {
        proxy_pass http://ocr-parser-service:8083/;
        proxy_set_header Host $host;
    }
    location /dev-health/gateway/ {
        proxy_pass http://api-gateway:8080/;
        proxy_set_header Host $host;
    }
    location /dev-health/clickhouse/ {
        proxy_pass http://clickhouse:8123/;
        proxy_set_header Host $host;
    }
    location /dev-health/prometheus/ {
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
    }
    location /dev-health/grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
    }
    location /dev-health/fluent-bit/ {
        proxy_pass http://fluent-bit:2020/;
        proxy_set_header Host $host;
    }
}
